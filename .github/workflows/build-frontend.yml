name: Build check

# Cloudflare Pages handles the real deploy. This workflow just verifies the
# Vite build compiles on every push / PR so broken builds are caught early.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Dummy values so the build (which reads import.meta.env) succeeds.
          # Real values live in Cloudflare Pages env vars.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder
